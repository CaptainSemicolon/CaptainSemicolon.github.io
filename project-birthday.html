	<body class="projectbirthday">
        <div class="container">
            <div class="clue-area">
                <div class="title">Hint 1: Some title</div>
                <div class="picture-container"><img class="picture" src="/images/clue.png"></div>
                <div class="text"><font id="clue-text"></font><br><font id="demo"></font></div>
            </div>
            <button class="next-btn" onclick="getLocation()">Find me!</button>
        </div>
    </body>
    <script>
        var positions = [
          {name:"Home",latitude:45.335,longitude:-73.973},
          {name:"Karianne's",latitude:45.371,longitude:-74.024},
          {name:"McDonalds Dorion",latitude:45.379,longitude:-74.017},
          {name:"Tim Hortons Dorion",latitude:45.378,longitude:-74.019},
          {name:"Audrey's House",latitude:45.390,longitude:-74.034}
        ]

        typewriter('[NAME OF TREASUREHUNTER],<br>You have been randomly assigned a treasurehunting task!<br>Your first mission is to head to the location seen in the picture above.<br>Good luck agent.<br>[END OF TRANSMISSION]', 50);
        var x = document.getElementById("demo");
        function getLocation() {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition);
          } else {
            x.innerHTML = "Geolocation is not supported by this browser.";
          }
        }
        
        function showPosition(position) {
          var str = "Latitude: " + (position.coords.latitude).toFixed(8) +
          "<br>Longitude: " + (position.coords.longitude).toFixed(8);
          
          var mylat = ((position.coords.latitude).toFixed(8)).toString().match(/^-?\d+(?:\.\d{0,3})?/)[0];
          var mylon = ((position.coords.longitude).toFixed(8)).toString().match(/^-?\d+(?:\.\d{0,3})?/)[0];
          for(var  i = 0; i != positions.length; i++){
              if(positions[i].latitude == mylat && positions[i].longitude == mylon)
                str += "<br>" + positions[i].name + ": <font style='color: green'>YES</font>";
              else
                str += "<br>" + positions[i].name + ": <font style='color: red'>NO</font>";
          }

          x.innerHTML = str;
        }

        async function typewriter(message, delay){
            for(var i = 0; i != message.length + 1; i++){
                if(message.charAt(i) != '<' && message.charAt(i+1) != 'b' && message.charAt(i+2) != 'r' && message.charAt(i+3) != '>'){
                    $('#clue-text').html(message.substring(0, i));
                    await sleep(delay);
                }
                else
                    i = i+1;
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
